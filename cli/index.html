<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>File Explorer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e1e; color: #ccc; height: 100vh; display: flex; flex-direction: column; }
        header { background: #2d2d2d; padding: 0.75rem 1rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #444; }
        header h1 { font-size: 1.5rem; margin: 0; color: #fff; }
        .logout { background: #d9534f; color: white; border: none; padding: 0.4rem 1rem; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 0.9rem; }
        .logout:hover { background: #c9302c; }
        main { flex: 1; padding: 1rem; overflow: auto; background: #1e1e1e; }
        .file-browser { background: #2d2d2d; border-radius: 6px; padding: 1rem; max-width: 1200px; margin: 0 auto; }
        .path-bar { background: #3c3c3c; padding: 0.5rem 1rem; border-radius: 4px; margin-bottom: 1rem; word-break: break-all; }
        .path-bar span { color: #888; }
        .path-bar .current-path { color: #4caf50; }
        .path-bar a { color: #4caf50; text-decoration: none; }
        .path-bar a:hover { text-decoration: underline; }
        .file-list { list-style: none; }
        .file-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; border-bottom: 1px solid #444; }
        .file-item:hover { background: #3c3c3c; }
        .file-item .name { flex: 1; cursor: pointer; }
        .file-item .name i { margin-right: 0.5rem; }
        .file-item .size { color: #888; margin-right: 1rem; min-width: 80px; text-align: right; }
        .file-item button { background: #0e639c; border: none; color: white; padding: 0.25rem 0.75rem; border-radius: 3px; cursor: pointer; }
        .file-item button:hover { background: #1177bb; }
        .upload-form { margin-top: 1.5rem; display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
        .upload-form input[type="file"] { background: #3c3c3c; color: #ccc; border: 1px solid #555; padding: 0.5rem; border-radius: 3px; flex: 1; min-width: 200px; }
        .upload-form button { background: #0e639c; border: none; color: white; padding: 0.5rem 1.5rem; border-radius: 3px; cursor: pointer; font-size: 1rem; }
        .upload-form button:hover { background: #1177bb; }
        @media (max-width: 600px) {
            .file-item { flex-wrap: wrap; }
            .file-item .size { min-width: auto; }
            .file-item button { margin-top: 0.25rem; }
        }
    </style>
</head>
<body>
    <header>
        <h1>File Explorer – /root</h1>
        <a href="/logout" class="logout">Logout</a>
    </header>
    <main>
        <div class="file-browser">
            <div class="path-bar" id="path-bar"></div>
            <ul class="file-list" id="file-list"></ul>
            <div class="upload-form">
                <input type="file" id="upload-file">
                <button id="upload-btn">Upload</button>
            </div>
        </div>
    </main>

    <script>
        (function() {
            let currentPath = '';  // relative to /root

            // Load directory listing
            function loadFiles(path) {
                fetch(`/api/files?path=${encodeURIComponent(path)}`, { credentials: 'include' })
                    .then(res => res.json())
                    .then(data => {
                        currentPath = data.path;
                        renderPath(data.path);
                        renderFiles(data.files);
                    })
                    .catch(err => console.error('Error loading files:', err));
            }

            // Render path breadcrumbs
            function renderPath(relPath) {
                const pb = document.getElementById('path-bar');
                const parts = relPath ? relPath.split('/') : [];
                let cumulative = '';
                let html = '<span>root</span> / ';
                parts.forEach((part, i) => {
                    cumulative += (cumulative ? '/' : '') + part;
                    html += `<a href="#" data-path="${cumulative}">${part}</a> / `;
                });
                pb.innerHTML = html.slice(0, -2); // remove trailing ' / '
                // Attach click handlers to breadcrumb links
                document.querySelectorAll('.path-bar a').forEach(link => {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        loadFiles(link.dataset.path);
                    });
                });
            }

            // Render file list
            function renderFiles(files) {
                const list = document.getElementById('file-list');
                list.innerHTML = '';

                // Parent directory link (if not at root)
                if (currentPath !== '') {
                    const parent = document.createElement('li');
                    parent.className = 'file-item';
                    parent.innerHTML = `
                        <span class="name"><i>📁</i> <a href="#" data-path="${currentPath.split('/').slice(0,-1).join('/')}">..</a></span>
                        <span class="size"></span>
                        <span></span>
                    `;
                    list.appendChild(parent);
                    parent.querySelector('a').addEventListener('click', (e) => {
                        e.preventDefault();
                        loadFiles(parent.querySelector('a').dataset.path);
                    });
                }

                // Files and directories
                files.forEach(f => {
                    const item = document.createElement('li');
                    item.className = 'file-item';
                    const icon = f.type === 'directory' ? '📁' : '📄';
                    const size = f.type === 'file' ? formatBytes(f.size) : '';

                    let downloadButton = '';
                    if (f.type === 'file') {
                        downloadButton = `<button class="download-btn" data-path="${currentPath ? currentPath+'/'+f.name : f.name}">Download</button>`;
                    }

                    item.innerHTML = `
                        <span class="name"><i>${icon}</i> ${f.type === 'directory' ? '<a href="#" class="dir-link" data-path="'+(currentPath ? currentPath+'/'+f.name : f.name)+'">'+f.name+'</a>' : f.name}</span>
                        <span class="size">${size}</span>
                        <span>${downloadButton}</span>
                    `;

                    if (f.type === 'directory') {
                        const link = item.querySelector('a');
                        link.addEventListener('click', (e) => {
                            e.preventDefault();
                            loadFiles(link.dataset.path);
                        });
                    } else {
                        const btn = item.querySelector('.download-btn');
                        if (btn) {
                            btn.addEventListener('click', () => {
                                window.location.href = `/api/files/download?path=${encodeURIComponent(currentPath ? currentPath+'/'+f.name : f.name)}`;
                            });
                        }
                    }
                    list.appendChild(item);
                });
            }

            function formatBytes(bytes) {
                if (bytes === 0) return '0 B';
                const k = 1024;
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
            }

            // Upload file
            document.getElementById('upload-btn').addEventListener('click', () => {
                const fileInput = document.getElementById('upload-file');
                if (!fileInput.files.length) {
                    alert('Please select a file.');
                    return;
                }
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);
                fetch(`/api/files/upload?path=${encodeURIComponent(currentPath)}`, {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                })
                .then(res => {
                    if (!res.ok) throw new Error('Upload failed');
                    return res.json();
                })
                .then(() => {
                    fileInput.value = '';
                    loadFiles(currentPath);  // refresh
                })
                .catch(err => {
                    alert('Upload failed: ' + err.message);
                });
            });

            // Initial load
            loadFiles('');
        })();
    </script>
</body>
</html>
